<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level Aggregator</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 95%; max-width: 800px; }
        textarea { width: 100%; height: 180px; background-color: #1e1e1e; color: #00ff88; border: 1px solid #444; padding: 10px; font-family: monospace; border-radius: 4px; }
        .controls { margin: 15px 0; }
        button { background-color: #3700b3; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 10px; transition: 0.2s; }
        button:hover { background-color: #6200ee; }
        .copy-btn { background-color: #03dac6; color: #000; }
        .copy-btn:hover { background-color: #018786; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #1e1e1e; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background-color: #2c2c2c; color: #bb86fc; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px; }
        tr:nth-child(even) { background-color: #252525; }
    </style>
</head>
<body>

<div class="container">
    <h2>Level Aggregator</h2>
    <textarea id="inputData" placeholder="Paste data here (e.g. GX H 25246.5 or PDO: 25471)..."></textarea>
    <div class="controls">
        <button onclick="processData()">Calculate Levels</button>
        <button class="copy-btn" onclick="copyToClipboard()">Copy for Sheets</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr><th>Level Label</th><th>Price</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
function processData() {
    const input = document.getElementById('inputData').value;
    const lines = input.split('\n');
    let data = [];

    lines.forEach(line => {
        // Matches "Key Value" or "Key: Value"
        const match = line.trim().match(/^(.*?)(?:\s+|:)\s*([\d.]+)$/);
        if (match) {
            data.push({ key: match[1].trim(), val: parseFloat(match[2]) });
        }
    });

    if (data.length === 0) return;
    data.sort((a, b) => b.val - a.val);

    let groups = [];
    let currentGroup = [data[0]];

    for (let i = 1; i < data.length; i++) {
        let groupVals = currentGroup.map(item => item.val);
        let minVal = Math.min(...groupVals, data[i].val);
        let maxVal = Math.max(...groupVals, data[i].val);

        if (maxVal - minVal <= 3) {
            currentGroup.push(data[i]);
        } else {
            groups.push(currentGroup);
            currentGroup = [data[i]];
        }
    }
    groups.push(currentGroup);

    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = '';

    groups.forEach(group => {
        let keys = group.map(g => g.key);
        let vals = group.map(g => g.val);
        
        // Merger Logic
        let processedKeys = [...keys];
        if (keys.includes('PDL') && keys.includes('yNL')) {
            processedKeys = processedKeys.filter(k => k !== 'PDL' && k !== 'yNL');
            processedKeys.push('PDNL');
        }
        if (keys.includes('PDH') && keys.includes('yNH')) {
            processedKeys = processedKeys.filter(k => k !== 'PDH' && k !== 'yNH');
            processedKeys.push('PDNH');
        }

        // Bias Rule
        let hCount = processedKeys.filter(k => k.endsWith('H')).length;
        let lCount = processedKeys.filter(k => k.endsWith('L')).length;
        
        let selectedVal = (lCount > hCount) ? Math.min(...vals) : (hCount > lCount) ? Math.max(...vals) : vals[0];

        const row = `<tr><td>${processedKeys.join(' / ')}</td><td>${selectedVal.toFixed(2)}</td></tr>`;
        resultBody.innerHTML += row;
    });
}

function copyToClipboard() {
    const rows = Array.from(document.querySelectorAll('#resultBody tr'));
    const tsv = rows.map(row => {
        const cells = Array.from(row.querySelectorAll('td'));
        return cells.map(c => c.innerText).join('\t');
    }).join('\n');
    
    navigator.clipboard.writeText(tsv).then(() => alert("Copied! Paste directly into Google Sheets."));
}
</script>
</body>
</html>
