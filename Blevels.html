<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blevels</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: flex-start; padding: 20px; }
        
        .container { width: 400px; text-align: left; }
        
        h2 { color: #bb86fc; margin-bottom: 10px; margin-top: 0; }
        
        /* Input group styling */
        .input-group { margin-bottom: 12px; }
        .input-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .input-header label { font-size: 0.95em; color: #aaa; margin-bottom: 0; flex: 1; }
        .clear-single-btn { 
            background-color: #2c2c2c;
            border: 1px solid #444; 
            color: #bb86fc; 
            padding: 4px 0;
            width: 20%;
            flex-shrink: 0;
            border-radius: 3px; 
            cursor: pointer; 
            font-size: 0.75em;
            font-weight: bold;
            transition: 0.2s;
            text-align: center;
        }
        .clear-single-btn:hover { background-color: #3700b3; border-color: #6200ee; color: #fff; }
        
        textarea { width: 100%; height: 80px; background-color: #1e1e1e; color: #00ff88; border: 1px solid #444; padding: 10px; font-family: monospace; border-radius: 4px; box-sizing: border-box; resize: vertical; }
        .input-large { height: 160px; }
        #platformOutput { height: 115px; color: #03dac6; margin-top: 8px; font-size: 0.8em; }
        
        /* Section labels */
        label { font-size: 0.95em; color: #aaa; margin-bottom: 4px; display: block; }
        
        /* Two-row button layout */
        .controls { margin: 15px 0; display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .button-row { display: flex; gap: 8px; width: 100%; }
        button { flex: 1; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85em; transition: 0.2s; }
        
        .calc-btn { background-color: #3700b3; color: white; }
        .calc-btn:hover { background-color: #6200ee; }
        .clear-btn { background-color: #444; color: #fff; }
        .clear-btn:hover { background-color: #666; }
        .copy-btn { background-color: #03dac6; color: #000; }
        .copy-btn:hover { background-color: #018786; }

        /* Threshold control styling */
        .threshold-control { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 10px;
            background-color: #1e1e1e;
            border-radius: 4px 4px 0 0;
            border: 1px solid #333;
            border-bottom: none;
        }
        .threshold-control label { 
            font-size: 0.85em; 
            color: #bb86fc; 
            margin-bottom: 0;
            white-space: nowrap;
        }
        .threshold-control input { 
            width: 70px; 
            padding: 6px 8px; 
            background-color: #2c2c2c; 
            color: #00ff88; 
            border: 1px solid #444; 
            border-radius: 4px; 
            font-family: monospace;
            font-size: 0.9em;
        }
        .threshold-control input:focus {
            outline: none;
            border-color: #bb86fc;
        }
        .threshold-hint {
            font-size: 0.7em;
            color: #666;
        }
        .updated-field {
            font-size: 0.75em;
            color: #666;
            padding: 8px 10px;
            background-color: #1e1e1e;
            border-radius: 0 0 4px 4px;
            border: 1px solid #333;
            border-top: 1px solid #333;
            margin-bottom: 10px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background-color: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 6px 10px; text-align: left; font-size: 0.85em; }
        th { background-color: #2c2c2c; color: #bb86fc; text-transform: uppercase; font-size: 0.7em; letter-spacing: 1px; }
        tr:nth-child(even) { background-color: #252525; }
    </style>
</head>
<body>

<div class="container">
    <h2>Blevels</h2>
    
    <div class="input-group">
        <div class="input-header">
            <label>Input 1 (Base Data)</label>
            <button class="clear-single-btn" onclick="clearInput(1)">Clear</button>
        </div>
        <textarea id="inputData1" placeholder="Paste data here..." oninput="saveToCache()"></textarea>
    </div>
    
    <div class="input-group">
        <div class="input-header">
            <label>Input 2 (Frequent Updates)</label>
            <button class="clear-single-btn" onclick="clearInput(2)">Clear</button>
        </div>
        <textarea id="inputData2" class="input-large" placeholder="Paste data here..." oninput="saveToCache()"></textarea>
    </div>
    
    <div class="input-group">
        <div class="input-header">
            <label>Input 3 (Frequent Updates)</label>
            <button class="clear-single-btn" onclick="clearInput(3)">Clear</button>
        </div>
        <textarea id="inputData3" class="input-large" placeholder="Paste data here..." oninput="saveToCache()"></textarea>
    </div>
    
    <label style="margin-top:12px;">Platform Output</label>
    <textarea id="platformOutput" readonly placeholder="Calculated string..."></textarea>

    <div class="controls">
        <div class="button-row">
            <button class="calc-btn" onclick="processData()">Calculate Levels</button>
            <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>
        <div class="button-row">
            <button class="copy-btn" onclick="copyPlatformOutput()">Copy Platform</button>
            <button class="copy-btn" onclick="copyToSheets()">Copy Sheets</button>
        </div>
    </div>

    <div class="threshold-control">
        <label>Grouping Threshold:</label>
        <input type="number" id="thresholdInput" value="3" min="0" step="0.5" oninput="saveToCache()">
        <span class="threshold-hint">points</span>
    </div>
    <div class="updated-field">Updated: 21 Feb, 21:30</div>

    <table id="resultTable">
        <thead>
            <tr><th>Level</th><th>Price</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
// Local storage functions
function saveToCache() {
    const data = {
        input1: document.getElementById('inputData1').value,
        input2: document.getElementById('inputData2').value,
        input3: document.getElementById('inputData3').value,
        threshold: document.getElementById('thresholdInput').value
    };
    localStorage.setItem('blevels_cache', JSON.stringify(data));
}

function loadFromCache() {
    const cached = localStorage.getItem('blevels_cache');
    if (cached) {
        try {
            const data = JSON.parse(cached);
            document.getElementById('inputData1').value = data.input1 || '';
            document.getElementById('inputData2').value = data.input2 || '';
            document.getElementById('inputData3').value = data.input3 || '';
            if (data.threshold) {
                document.getElementById('thresholdInput').value = data.threshold;
            }
        } catch (e) {
            console.error('Failed to load cache:', e);
        }
    }
}

// Load cache on page load
document.addEventListener('DOMContentLoaded', loadFromCache);

function getThreshold() {
    const val = parseFloat(document.getElementById('thresholdInput').value);
    return isNaN(val) ? 3 : val;
}

function getCombinedInput() {
    const input1 = document.getElementById('inputData1').value;
    const input2 = document.getElementById('inputData2').value;
    const input3 = document.getElementById('inputData3').value;
    return [input1, input2, input3].filter(s => s.trim()).join('\n');
}

function processData() {
    const input = getCombinedInput();
    const lines = input.split('\n');
    const threshold = getThreshold();
    let data = [];

    lines.forEach(line => {
        const match = line.trim().match(/^(.*?)(?:\s+|:)\s*([\d.]+)$/);
        if (match) {
            data.push({ key: match[1].trim(), val: parseFloat(match[2]) });
        }
    });

    if (data.length === 0) return;
    data.sort((a, b) => b.val - a.val);

    let groups = [];
    if (data.length > 0) {
        let currentGroup = [data[0]];
        for (let i = 1; i < data.length; i++) {
            let groupVals = currentGroup.map(item => item.val);
            let minVal = Math.min(...groupVals, data[i].val);
            let maxVal = Math.max(...groupVals, data[i].val);
            if (maxVal - minVal <= threshold) {
                currentGroup.push(data[i]);
            } else {
                groups.push(currentGroup);
                currentGroup = [data[i]];
            }
        }
        groups.push(currentGroup);
    }

    const processedResults = groups.map(group => {
        let keys = group.map(g => g.key);
        let vals = group.map(g => g.val);
        
        let processedKeys = [...keys];
        if (keys.includes('PDL') && keys.includes('yNL')) {
            processedKeys = processedKeys.filter(k => k !== 'PDL' && k !== 'yNL');
            processedKeys.push('PDNL');
        }
        if (keys.includes('PDH') && keys.includes('yNH')) {
            processedKeys = processedKeys.filter(k => k !== 'PDH' && k !== 'yNH');
            processedKeys.push('PDNH');
        }
        if (keys.includes('WEH') && keys.includes('WRH')) {
            processedKeys = processedKeys.filter(k => k !== 'WEH' && k !== 'WRH');
            processedKeys.push('WERH');
        }
        if (keys.includes('WEL') && keys.includes('WRL')) {
            processedKeys = processedKeys.filter(k => k !== 'WEL' && k !== 'WRL');
            processedKeys.push('WERL');
        }

        let hCount = processedKeys.filter(k => k.endsWith('H')).length;
        let lCount = processedKeys.filter(k => k.endsWith('L')).length;
        
        let selectedVal = (lCount > hCount) ? Math.min(...vals) : (hCount > lCount) ? Math.max(...vals) : vals[0];
        return { label: processedKeys.join(' / '), price: selectedVal.toFixed(2) };
    });

    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = '';
    processedResults.forEach(res => {
        resultBody.innerHTML += `<tr><td>${res.label}</td><td>${res.price}</td></tr>`;
    });

    const platformString = processedResults.map(res => `${res.label}, ${res.price}`).join('\\n');
    document.getElementById('platformOutput').value = `"${platformString}"`;
}

function copyPlatformOutput() {
    processData(); // Recalculate before copying
    const text = document.getElementById('platformOutput').value;
    if (!text) return;
    navigator.clipboard.writeText(text);
}

function copyToSheets() {
    processData(); // Recalculate before copying
    const rows = Array.from(document.querySelectorAll('#resultBody tr'));
    if (rows.length === 0) return;
    const tsv = rows.map(row => {
        const cells = Array.from(row.querySelectorAll('td'));
        return cells.map(c => c.innerText).join('\t');
    }).join('\n');
    navigator.clipboard.writeText(tsv);
}

function clearInput(num) {
    document.getElementById('inputData' + num).value = '';
    saveToCache();
}

function clearAll() {
    document.getElementById('inputData1').value = '';
    document.getElementById('inputData2').value = '';
    document.getElementById('inputData3').value = '';
    document.getElementById('platformOutput').value = '';
    document.getElementById('resultBody').innerHTML = '';
    saveToCache();
}
</script>
</body>
</html>
